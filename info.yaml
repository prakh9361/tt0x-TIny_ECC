# Tiny Tapeout project information
project:
  title:        "Tiny_ECC"      # Project title
  author:       "Prakhar Pranav"      # Your name
  discord:      "ppap_0110"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "private to public key for eliptical curve cryptography"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_ecc_gf2_8"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "ecc_core_gf2_8.v"
    - "alu_gf2_8.v"
    - "inv_rom.v"
    

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  # Outputs
  uo[0]: "data_out[0]"
  uo[1]: "data_out[1]"
  uo[2]: "data_out[2]"
  uo[3]: "data_out[3]"
  uo[4]: "data_out[4]"
  uo[5]: "data_out[5]"
  uo[6]: "data_out[6]"
  uo[7]: "data_out[7]"

  # Bidirectional pins
  uio[0]: "input: load_k"
  uio[1]: "input: load_x"
  uio[2]: "input: load_y"
  uio[3]: "input: start"
  uio[4]: "input: read_sel (0=X, 1=Y)"
  uio[5]: "output: status_done"
  uio[6]: "output: status_busy"
  uio[7]: "output: status_error"

# Do not change!
yaml_version: 6
